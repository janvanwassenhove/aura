[project]
name = "shared-events"
version = "0.1.0"
description = "AURA AsyncEventBus and WebSocketBroadcaster"
requires-python = ">=3.11"
dependencies = [
    "shared-schemas",
    "fastapi>=0.111",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_events"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
