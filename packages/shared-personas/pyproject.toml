[project]
name = "shared-personas"
version = "0.1.0"
description = "AURA persona definitions and gesture profiles"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_personas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
