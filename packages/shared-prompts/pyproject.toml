[project]
name = "shared-prompts"
version = "0.1.0"
description = "AURA LLM prompt templates"
requires-python = ">=3.11"
dependencies = [
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_prompts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
