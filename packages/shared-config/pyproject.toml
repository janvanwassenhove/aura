[project]
name = "shared-config"
version = "0.1.0"
description = "AURA shared pydantic-settings config classes for all services"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_config"]

[tool.pytest.ini_options]
testpaths = ["tests"]
