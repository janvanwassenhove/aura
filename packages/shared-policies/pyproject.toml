[project]
name = "shared-policies"
version = "0.1.0"
description = "AURA approval rules and mode access control"
requires-python = ">=3.11"
dependencies = [
    "shared-schemas",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_policies"]

[tool.pytest.ini_options]
testpaths = ["tests"]
