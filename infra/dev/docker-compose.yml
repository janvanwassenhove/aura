version: "3.9"

# Phase 1 (ADR-007): the five laptop-side services are merged into one
# `aura-brain` process. Only robot-runtime stays a separate service (it runs on
# the Reachy). Three containers for local dev: robot-runtime, aura-brain, console.

services:
  robot-runtime:
    image: aura/robot-runtime:dev
    build:
      context: ../..
      dockerfile: services/robot-runtime/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ROBOT_ADAPTER=${ROBOT_ADAPTER:-fake}
      - IDLE_INTERVAL_SECONDS=${IDLE_INTERVAL_SECONDS:-4}
      - EVENT_BUS_HOST=0.0.0.0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  aura-brain:
    image: aura/aura-brain:dev
    build:
      context: ../..
      dockerfile: apps/aura-brain/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      # Persona / mode
      - ACTIVE_PERSONA=${ACTIVE_PERSONA:-work}
      # LLM provider switch
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      # Voice (null = text-first; openai_realtime for the GA Realtime transport)
      - STT_PROVIDER=${STT_PROVIDER:-null}
      - TTS_PROVIDER=${TTS_PROVIDER:-null}
      # Connector
      - M365_CONNECTOR=${M365_CONNECTOR:-mock}
      - ENABLED_CONNECTORS=${ENABLED_CONNECTORS:-m365}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      # Memory (SQLite under the data volume)
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////data/aura-memory.db}
      - REMINDER_CHECK_INTERVAL=${REMINDER_CHECK_INTERVAL:-10}
      # Identity keyring (cryptfile for headless/Docker)
      - KEYRING_BACKEND=${KEYRING_BACKEND:-cryptfile}
      - KEYRING_PASSPHRASE=${KEYRING_PASSPHRASE:-}
      # Robot boundary (the one remaining network hop)
      - ROBOT_RUNTIME_URL=http://robot-runtime:8001
      # Heartbeat watches the real failure surface: brainâ†”robot link + upstream
      - HEARTBEAT_ENABLED=${HEARTBEAT_ENABLED:-true}
      - UPSTREAM_HEALTH_URL=${UPSTREAM_HEALTH_URL:-}
      # Approval / gateway
      - APPROVAL_TIMEOUT_SECONDS=${APPROVAL_TIMEOUT_SECONDS:-30}
      - GATEWAY_KEYS=${GATEWAY_KEYS:-}
    volumes:
      - aura-data:/data
      - identity-keyring:/data/keyring
    depends_on:
      - robot-runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  operator-console:
    image: aura/operator-console:dev
    build:
      context: ../../apps/operator-console
      dockerfile: Dockerfile
      args:
        # All brain APIs (orchestrator, identity, connector) share one origin now.
        - VITE_ORCHESTRATOR_URL=http://localhost:8000
        - VITE_ORCHESTRATOR_WS=ws://localhost:8000/ws/events
        - VITE_IDENTITY_URL=http://localhost:8000
        - VITE_CONNECTOR_URL=http://localhost:8000
        # robot-runtime stays separate (runs on the Reachy)
        - VITE_ROBOT_RUNTIME_WS=ws://localhost:8001/ws/events
    ports:
      - "5173:5173"
    depends_on:
      - aura-brain
    restart: unless-stopped

volumes:
  aura-data:
    driver: local
  identity-keyring:
    driver: local
