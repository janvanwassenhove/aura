name: CI

# U166: this repo's branches are master + aura-autobuild — the old
# main/develop triggers meant CI never actually ran on pushes.
on:
  push:
    branches: [master, main, aura-autobuild]
  pull_request:
    branches: [master, main]

jobs:
  # U167: enforced backstop for the pre-commit privacy hook — the hook can be
  # bypassed (--no-verify, fresh clone without core.hooksPath); this cannot.
  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Privacy scan (no personal data in the tree)
        run: python scripts/privacy_scan.py --all
      - name: Scanner self-tests
        run: |
          pip install pytest
          pytest scripts/test_privacy_scan.py -q

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install workspace dependencies
        run: uv sync --all-packages

      - name: Run shared-schemas tests
        run: uv run --package shared-schemas --extra dev pytest packages/shared-schemas/tests -v

      - name: Run shared-events tests
        run: uv run --package shared-events --extra dev pytest packages/shared-events/tests -v

      - name: Run shared-policies tests
        run: uv run --package shared-policies --extra dev pytest packages/shared-policies/tests -v

      - name: Run shared-personas tests
        run: uv run --package shared-personas --extra dev pytest packages/shared-personas/tests -v

      - name: Run robot-runtime tests
        run: uv run --package robot-runtime --extra dev pytest services/robot-runtime/tests -v

      - name: Run memory-service tests
        run: uv run --package memory-service --extra dev pytest services/memory-service/tests -v

      - name: Run orchestrator tests
        run: uv run --package orchestrator --extra dev pytest services/orchestrator/tests -v

      - name: Run conversation-runtime tests
        run: uv run --package conversation-runtime --extra dev pytest services/conversation-runtime/tests -v

      - name: Run connector-service tests
        run: uv run --package connector-service --extra dev pytest services/connector-service/tests -v

      - name: Run aura-brain tests
        run: uv run --package aura-brain --extra dev pytest apps/aura-brain/tests -v

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Console tests + build
        working-directory: apps/operator-console
        run: |
          npm ci
          npm test
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check packages/ services/
